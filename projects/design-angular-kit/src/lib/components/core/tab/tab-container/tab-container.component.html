<div
  [class.row]="isVertical"
  [class.flex-row-reverse]="inverted && isVertical"
  [class.d-flex]="inverted && !isVertical"
  [class.flex-column-reverse]="inverted && !isVertical">
  <div
    [class.col-5]="inverted && isVertical"
    [class.col-md-4]="inverted && isVertical"
    [class.col-lg-3]="inverted && isVertical"
    [class.col-4]="!inverted && isVertical"
    [class.col-md-3]="!inverted && isVertical">
    @if (tabs) {
      <ul
        class="nav nav-tabs"
        [class.nav-tabs-editable]="editable"
        [class.nav-tabs-cards]="cards"
        [class.nav-tabs-vertical]="isVertical"
        [class.auto]="auto"
        [class.nav-tabs-icon-text]="iconText"
        [class.nav-dark]="dark"
        role="tablist">
        @for (tab of tabs; track tab.id; let i = $index) {
          <li class="nav-item">
            <a
              #tabNavLinks
              [id]="tab.id + '-tab-link'"
              role="tab"
              class="nav-link"
              [class.active]="tab.active"
              [class.disabled]="tab.disabled"
              [attr.href]="'#' + tab.id + '-tab'"
              [attr.aria-controls]="tab.id + '-tab'"
              (click)="onTab(tab)">
              @if (tab.icon) {
                <it-icon [name]="tab.icon" class="me-2"></it-icon>
              }
              {{ tab.label }}
            </a>
            @if (editable) {
              <a class="nav-link-close" (click)="clickToClose(i)" (keypress)="clickToClose(i)" [attr.disabled]="tab.disabled">
                <it-icon name="close"></it-icon>
              </a>
            }
          </li>
        }
        @if (editable) {
          <li class="nav-item">
            <a href="#" class="nav-tab-add" (click)="clickToAdd($event)" (keypress)="clickToAdd($event)"
              ><span class="visually-hidden"> Aggiungi un tab</span></a
            >
          </li>
        }
      </ul>
    }
  </div>
  <div
    [class.col-7]="inverted && isVertical"
    [class.col-md-8]="inverted && isVertical"
    [class.col-lg-9]="inverted && isVertical"
    [class.col-8]="!inverted && isVertical"
    [class.col-md-9]="!inverted && isVertical">
    @if (tabs) {
      <div class="tab-content">
        @for (tab of tabs; track tab.id) {
          <div
            [id]="tab.id + '-tab'"
            class="tab-pane p-4 fade {{ tab.class ?? '' }}"
            [class.active]="tab.active"
            [class.show]="tab.active"
            role="tabpanel"
            [attr.aria-labelledby]="tab.id + '-tab-link'">
            <ng-container *ngTemplateOutlet="tab.htmlContent"></ng-container>
          </div>
        }
      </div>
    }
  </div>
</div>
