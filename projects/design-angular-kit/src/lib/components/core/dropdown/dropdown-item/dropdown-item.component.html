@if (isHostElement) {
  <ng-container *ngTemplateOutlet="content"></ng-container>
} @else {
  <li>
    <ng-container *ngTemplateOutlet="content"></ng-container>
  </li>
}

<ng-template #content>
  @if (divider) {
    <span class="divider"></span>
  } @else {
    <it-link [class]="linkClass" [id]="id" [href]="href" [externalLink]="externalLink" [disabled]="disabled">
      @if (iconName && resolvedIconPosition === 'left') {
        <it-icon size="sm" [name]="iconName" [color]="isDark ? 'light' : 'primary'" [svgClass]="resolvedIconPosition"></it-icon>
      }
      <span><ng-content></ng-content></span>
      @if (iconName && resolvedIconPosition === 'right') {
        <it-icon size="sm" [name]="iconName" [color]="isDark ? 'light' : 'primary'" [svgClass]="resolvedIconPosition"></it-icon>
      }
      @if (active) {
        <span class="visually-hidden">{{ 'it.core.active' | translate }}</span>
      }
    </it-link>
  }
</ng-template>
